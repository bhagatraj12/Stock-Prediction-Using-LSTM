{% extends "base.html" %}
{% block title %}Login - StockAI{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <a href="/" class="logo">
                <span class="logo-icon">📈</span>
                <span class="logo-text">Stock<span class="gradient-text">AI</span></span>
            </a>
            <p class="auth-subtitle">Welcome back! Sign in to your account.</p>
        </div>

        <form class="auth-form glass-card" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            <p class="auth-switch">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
